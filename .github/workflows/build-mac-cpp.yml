name: Build macOS DMG (C++)

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'laser-cpp/**'
      - '.github/workflows/build-mac-cpp.yml'

jobs:
  build-mac-cpp:
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      QT_VERSION: 6.7.3
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt6 (universal, via aqtinstall)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          cache: true

      - name: Configure (universal arm64 + x86_64)
        working-directory: laser-cpp
        run: |
          cp -f ../logo_panel.png resources/logo_panel.png 2>/dev/null || true
          rm -rf build
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${MACOSX_DEPLOYMENT_TARGET}

      - name: Build
        working-directory: laser-cpp
        run: cmake --build build --config Release -j

      - name: Verify universal binary
        working-directory: laser-cpp
        run: |
          BIN="build/GYROCUELaser.app/Contents/MacOS/GYROCUELaser"
          file "$BIN"
          lipo -archs "$BIN"

      - name: macdeployqt + DMG
        working-directory: laser-cpp
        run: |
          macdeployqt build/GYROCUELaser.app -dmg
          mv build/GYROCUELaser.dmg build/GYROCUELaser_v6.0.dmg
          ls -lah build/GYROCUELaser_v6.0.dmg

      - name: Upload DMG to v6.0 release (replace existing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v6.0 \
            laser-cpp/build/GYROCUELaser_v6.0.dmg \
            --clobber \
            -R ${{ github.repository }}

      - name: Upload artifact (diagnostic)
        uses: actions/upload-artifact@v4
        with:
          name: GYROCUELaser-macOS-cpp-universal
          path: laser-cpp/build/GYROCUELaser_v6.0.dmg
          retention-days: 30
